    const xS     = hr.left + SPINE_INSET;

    const yTop   = hr.top + (hr.bottom - hr.top) * 0.33;
    const xMid   = (hr.left + hr.right) / 2;
    const yEnd   = kids[kids.length - 1].midY;
    const color  = getComputedStyle(sBubble).borderLeftColor || "currentColor";

    const path = document.createElementNS(SVG_NS, "path");

    const parts = [
      `M ${xS} ${yTop} L ${xMid} ${yTop}`,
      `M ${xS} ${yTop} L ${xS} ${yEnd}`,
    ];
    for (const k of kids) {
      const xC = k.left + 2;   
      parts.push(`M ${xS} ${k.midY} L ${xC} ${k.midY}`);
    }
    path.setAttribute("d", parts.join(" "));
    path.setAttribute("fill", "none");
    path.setAttribute("stroke", color);
    path.setAttribute("stroke-width", String(SPINE_W));
    path.setAttribute("stroke-linecap", "round");
    path.setAttribute("stroke-linejoin", "round");
    svg.appendChild(path);
  }

  content.insertBefore(svg, content.firstChild);
}

function formatLastSync(ts) {
  if (!ts) return "";
  const d   = new Date(ts);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60)   return "Synced just now";
  if (diff < 3600) return `Synced ${Math.floor(diff / 60)}m ago`;
  if (diff < 86400) return `Synced ${Math.floor(diff / 3600)}h ago`;
  const yest = new Date(now); yest.setDate(yest.getDate() - 1);
  if (d.toDateString() === yest.toDateString()) {
    return `Synced yesterday, ${timeLabel(d)}`;
  }
  return `Synced ${dateLabel(d)}`;
}

function chevronsSvg(dir) {
  const paths = dir === "up"
    ? '<path d="M5 9.5 12 4l7 5.5"></path><path d="M5 15.5 12 10l7 5.5"></path>'
    : '<path d="M5 8.5 12 14l7-5.5"></path><path d="M5 14.5 12 20l7-5.5"></path>';
  return '<svg viewBox="0 0 24 24" width="1em" height="1em" fill="none" '
       + 'stroke="currentColor" stroke-width="2" stroke-linecap="round" '
       + 'stroke-linejoin="round" aria-hidden="true">' + paths + '</svg>';
}

function exportState() {
  const payload = {
    v: 1,
    schedule: state.schedule,

    scheduleLog: state.scheduleLog || {},
    showPast: state.showPast,
    hiddenTypes: state.hiddenTypes,
    selectedDates: state.selectedDates,
    notes: state.notes,
    
    meWidth: state.meWidth,

  };
  const json = JSON.stringify(payload);
  
  const b64 = btoa(unescape(encodeURIComponent(json)));
  return "CONF1:" + b64;
}

function importState(code) {
  code = (code || "").trim();

  const QUOTE_PAIRS = [
    ['"',  '"'],
    ["'",  "'"],
    ["`",  "`"],
    ["\u201C", "\u201D"],   
    ["\u2018", "\u2019"],   
    ["\u00AB", "\u00BB"],   
  ];
  for (const [open, close] of QUOTE_PAIRS) {
    if (code.length >= 2 && code.startsWith(open) && code.endsWith(close)) {
      code = code.slice(open.length, code.length - close.length).trim();
      break;
    }
  }
  if (!code.startsWith("CONF1:")) throw new Error("Not a valid sync code.");
  const json = decodeURIComponent(escape(atob(code.slice(6))));
  const data = JSON.parse(json);
  if (data.v !== 1) throw new Error("Unsupported version.");

  const incomingSchedule = Array.isArray(data.schedule) ? data.schedule : [];
  const incomingHasLog = !!(data.scheduleLog && typeof data.scheduleLog === "object");
  const incomingLog = incomingHasLog
    ? data.scheduleLog
    : Object.fromEntries(incomingSchedule.map(id => [id, { op: "add", ts: 0, legacy: true }]));

  const localLog = state.scheduleLog || {};
  const mergedLog = {};
  const idsSeen = new Set([...Object.keys(localLog), ...Object.keys(incomingLog)]);
  let added = 0, removed = 0;
  const wasScheduled = new Set(state.schedule);
  for (const id of idsSeen) {
    const a = localLog[id];
    const b = incomingLog[id];
    let winner;
    if (a && b) {

      if (b.legacy && b.op === "add")      winner = b;
      else if (a.legacy && a.op === "add") winner = a;     
      else                                  winner = (b.ts >= a.ts) ? b : a;
    } else {
      winner = a || b;
    }

    if (!winner || (winner.op !== "add" && winner.op !== "del")) continue;

    mergedLog[id] = { op: winner.op, ts: Number(winner.ts) || 0 };
    const nowScheduled = (winner.op === "add");
    if (nowScheduled && !wasScheduled.has(id))  added++;
    if (!nowScheduled && wasScheduled.has(id))  removed++;
  }
  const merged = Object.keys(mergedLog)
    .filter(id => mergedLog[id].op === "add");

  let selDates;
  if (Array.isArray(data.selectedDates)) {
    selDates = data.selectedDates.slice();
  } else if (data.dateRange && typeof data.dateRange === "object") {
    const lo = data.dateRange.start || null;
    const hi = data.dateRange.end   || null;
    if (!lo && !hi) {
      selDates = [];
    } else {
      const loCmp = lo || "0000-00-00";
      const hiCmp = hi || "9999-99-99";
      selDates = ALL_DATES.filter(d => d >= loCmp && d <= hiCmp);
    }
  } else {
    selDates = [];
  }

  const mergedNotes = Object.assign({}, state.notes || {});
  const incomingNotes = (data.notes && typeof data.notes === "object")
    ? data.notes : {};
  const _sessionIds = new Set(DATA.sessions.map(x => x.id));
  for (const key in incomingNotes) {
    if (_sessionIds.has(key)) continue;   
    const incoming = (incomingNotes[key] || "").toString();
    const existing = (mergedNotes[key] || "").toString();
    if (!incoming) continue;
    if (!existing || incoming.length > existing.length) {
      mergedNotes[key] = incoming;
    }
  }

  for (const key of Object.keys(mergedNotes)) {
    if (_sessionIds.has(key)) delete mergedNotes[key];
  }

  Object.assign(state, {
    schedule:       merged,
    scheduleLog:    mergedLog,
    showPast:       (typeof data.showPast === "object" && data.showPast)
                      ? Object.values(data.showPast).some(Boolean)
                      : !!data.showPast,
    hiddenTypes:    Array.isArray(data.hiddenTypes) ? data.hiddenTypes : [],
    selectedDates:  selDates,
    notes:          mergedNotes,

    meWidth:        (typeof data.meWidth === "number" && isFinite(data.meWidth))
                      ? data.meWidth
                      : (state.meWidth ?? null),
    lastSyncAt:     Date.now(),
  });
  saveState();
  applyMeWidth();
  render();
  return { added, removed };
}

async function doCopy() {
  const code = exportState();
  try {
    await navigator.clipboard.writeText(code);

    flashToast(`Copied (${code.length} chars).`);
  } catch (_) {
    showCopySheet(code);
  }
}

async function doPaste() {
  try {
    const code = await navigator.clipboard.readText();
    if (code && code.trim()) { doImport(code.trim()); return; }
  } catch (_) {}
  showPasteSheet();
}

function doImport(code) {
  try {
    const { added, removed } = importState(code);
    const pluralize = (n, w) => `${n} ${w}${n === 1 ? "" : "s"}`;
    if (added === 0 && removed === 0) {
      flashToast("Nothing new — already in sync.");
    } else if (removed === 0) {
      flashToast(`Added ${pluralize(added, "item")}.`);
    } else if (added === 0) {
      flashToast(`Removed ${pluralize(removed, "item")}.`);
    } else {
      flashToast(`Added ${added}, removed ${removed}.`);
    }
  }
  catch (e) { window.alert("Couldn’t import: " + e.message); }
}

function showSyncSheet({ title, hint, value, readOnly, primaryLabel, onPrimary }) {
  
  document.querySelectorAll(".sheet-overlay").forEach(o => o.remove());

  const overlay = el("div", { class: "sheet-overlay" });
  const card    = el("div", { class: "sheet-card" });
  card.appendChild(el("h2", { class: "sheet-title" }, title));
  if (hint) card.appendChild(el("p", { class: "sheet-hint" }, hint));

  const ta = el("textarea", {
    class: "sheet-textarea",
    rows: 4,
    spellcheck: "false",
    autocapitalize: "off",
    autocorrect: "off",
  });
  if (value)    ta.value = value;
  if (readOnly) ta.readOnly = true;
  card.appendChild(ta);

  const btns = el("div", { class: "sheet-btns" });
  const cancel  = el("button", { class: "sheet-btn sheet-btn-cancel" }, "Cancel");
  const primary = el("button", { class: "sheet-btn sheet-btn-primary" }, primaryLabel);
  btns.appendChild(cancel);
  btns.appendChild(primary);
  card.appendChild(btns);
  overlay.appendChild(card);
  document.body.appendChild(overlay);

  const close = () => overlay.remove();
  cancel.addEventListener("click", close);
  overlay.addEventListener("click", e => { if (e.target === overlay) close(); });
  
  card.addEventListener("click", e => e.stopPropagation());

  requestAnimationFrame(() => {
    ta.focus();
    if (readOnly) ta.select();
  });

  if (!readOnly) {
    ta.addEventListener("paste", () => {
      
      setTimeout(() => {
        const v = ta.value.trim();
        if (v) { close(); onPrimary(v); }
      }, 30);
    });
  }

  primary.addEventListener("click", () => {
    if (readOnly) { close(); return; }
    const v = ta.value.trim();
    if (!v) { close(); return; }
    close();
    onPrimary(v);
  });
}

function updateScrollIndicatorIn(ind, scope, bodyCls) {
  if (!ind || !scope) return;
  const dates = scope.querySelectorAll(".date-header");
  const times = scope.querySelectorAll(".time-header");
  const hasAny = dates.length + times.length > 0;
  if (bodyCls) document.body.classList.toggle(bodyCls, hasAny);
  if (!hasAny) { ind.innerHTML = ""; return; }

  const cursor = ind.getBoundingClientRect().bottom + 2;
  let curDate = "", curTime = "";
  dates.forEach(h => { if (h.getBoundingClientRect().top <= cursor) curDate = h.textContent; });
  times.forEach(h => { if (h.getBoundingClientRect().top <= cursor) curTime = h.textContent; });
  if (!curDate && dates.length) curDate = dates[0].textContent;
  if (!curTime && times.length) curTime = times[0].textContent;

  const buildHtml = (dateText) => {
    const p = [];
    if (dateText) p.push(`<span class="date">${esc(dateText)}</span>`);
    if (curTime)  p.push(`<span class="time">${esc(curTime)}</span>`);
    let h = p.join('<span class="sep">·</span>');
    return h;
  };
  const wraps = () => ind.scrollHeight > ind.clientHeight + 1;

  ind.innerHTML = buildHtml(curDate);
  if (curDate && wraps()) {
    
    const shorter = curDate.includes("·")
      ? curDate.slice(curDate.lastIndexOf("·") + 1).trim()
      : curDate;
    ind.innerHTML = buildHtml(shorter);
    if (wraps()) ind.innerHTML = buildHtml("");   
  }
}

  el.style.whiteSpace = prevWS;
  if (overflows) el.textContent = short;

function applyFontScale() {
  let f = state.fontScale;
  if (typeof f !== "number" || !isFinite(f)) f = 1;
  f = Math.max(FS_MIN, Math.min(FS_MAX, f));
  document.documentElement.style.setProperty("--fs", f);
  return f;
}

function scrollParentOf(node) {
  let n = node ? node.parentElement : null;
  while (n && n !== document.body && n !== document.documentElement) {
    const oy = getComputedStyle(n).overflowY;
    if ((oy === "auto" || oy === "scroll") && n.scrollHeight > n.clientHeight + 1) {
      return { top: () => n.scrollTop, by: (dy) => { n.scrollTop += dy; } };
    }
    n = n.parentElement;
  }
  
  return {
    top: () => window.scrollY || window.pageYOffset || 0,
    by: (dy) => window.scrollBy(0, dy),
  };
}

function redrawAllConnectors() {
  drawMeConnectors();              
  drawSessionDetailConnectors();   
  drawSessionListConnectors();

function redrawConnectorsForFontScale() {

function stepFontScale(dir, btn) {
  const cur = (typeof state.fontScale === "number" && isFinite(state.fontScale))
                ? state.fontScale : 1;
  const next = Math.max(FS_MIN, Math.min(FS_MAX,
                 Math.round((cur + dir * FS_STEP) * 10) / 10));
  if (next === state.fontScale) return;   

  const anchor = btn || null;
  const scroller = anchor ? scrollParentOf(anchor) : null;
  const beforeTop = anchor ? anchor.getBoundingClientRect().top : 0;

  const leftAnchor = (state.activeTab !== "me") ? captureListAnchor() : null;

  state.fontScale = next;
  applyFontScale();
  saveState();
  updateFontScaleControl();
  redrawConnectorsForFontScale();
  fitBottomControls();   

  if (state.activeTab === "me" && currentTopView() === "list") {
    fitTitle($("#page-title"), "My Schedule", "Me");
  }
  fitTitle($(".me-pane-title"), "My Schedule", "Me");
  updateScrollIndicator();

  refitAllBylines();

  if (anchor && scroller) {
    const afterTop = anchor.getBoundingClientRect().top;
    const delta = afterTop - beforeTop;
    if (delta) scroller.by(delta);
  }
  
  if (leftAnchor) restoreListAnchor(leftAnchor);
}

function updateFontScaleControl() {
  const f = (typeof state.fontScale === "number" && isFinite(state.fontScale))
              ? state.fontScale : 1;
  for (const wrap of document.querySelectorAll(".fs-control")) {
    const pct = wrap.querySelector(".fs-pct");
    if (pct) pct.textContent = Math.round(f * 100) + "%";
    const dec = wrap.querySelector(".fs-dec");
    const inc = wrap.querySelector(".fs-inc");
    if (dec) dec.disabled = f <= FS_MIN + 1e-9;
    if (inc) inc.disabled = f >= FS_MAX - 1e-9;
  }
}

function ME_MIN() { return 280; }                       
function ME_MAX() { return Math.round(window.innerWidth * 0.6); } 
function applyMeWidth() {
  const root = document.documentElement;
  let w = state.meWidth;
  if (typeof w !== "number" || !isFinite(w)) {

    w = Math.round(window.innerWidth / 3);
  }
  w = Math.max(ME_MIN(), Math.min(ME_MAX(), w));
  root.style.setProperty("--me-w", w + "px");
  return w;
}

function initMeResize() {
  const grip = $("#me-resizer");
  if (!grip) return;
  let dragging = false;
  let pendingW = null;
  let rafScheduled = false;

  const flush = () => {
    rafScheduled = false;
    if (pendingW == null) return;
    document.documentElement.style.setProperty("--me-w", pendingW + "px");
    state.meWidth = pendingW;   
    pendingW = null;
  };

  const onMove = (e) => {
    if (!dragging) return;
    
    pendingW = Math.max(ME_MIN(), Math.min(ME_MAX(),
      Math.round(window.innerWidth - e.clientX)));
    if (!rafScheduled) {
      rafScheduled = true;
      requestAnimationFrame(flush);
    }
    if (e.cancelable) e.preventDefault();
  };
  const onUp = () => {
    if (!dragging) return;
    dragging = false;

    if (pendingW != null) flush();
    document.body.classList.remove("me-resizing");
    window.removeEventListener("pointermove", onMove);
    window.removeEventListener("pointerup", onUp);
    window.removeEventListener("pointercancel", onUp);

    applyMeWidth();
    saveState();
    const pane = $("#me-content");
    if (pane) drawMeConnectors(pane);

    refitAllBylines();
  };

  grip.addEventListener("pointerdown", (e) => {
    if (!isWide()) return;        
    dragging = true;
    document.body.classList.add("me-resizing");
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
    window.addEventListener("pointercancel", onUp);
    if (e.cancelable) e.preventDefault();
  });

  grip.addEventListener("dblclick", () => {
    state.meWidth = null;
    applyMeWidth();
    saveState();
    const pane = $("#me-content");

    refitAllBylines();

function initMePaneScroll() {
  const pane = $("#me-content");
  if (!pane) return;
  pane.addEventListener("scroll", () => {
    updateScrollIndicatorIn($("#me-scroll-indicator"), pane, "has-me-indicator");
  }, { passive: true });
}

function renderMePane() {
  const pane = $("#me-content");
  if (!pane) return;
  if (!isWide()) { disconnectBylineObservers(pane); pane.innerHTML = ""; return; }

  const sync = $("#me-pane-sync");
  if (sync) sync.textContent = formatLastSync(state.lastSyncAt);

  fitTitle($(".me-pane-title"), "My Schedule", "Me");
  const extra = $("#me-pane-extra");
  if (extra) {
    extra.innerHTML = "";
    appendSyncControls(extra);
  }

  const prevScroll = pane.scrollTop;
  const prevAnchor = captureListAnchor(pane);
  const restorePane = () => {
    if (!(prevAnchor && restoreListAnchor(prevAnchor, pane))) {
      pane.scrollTop = prevScroll;
    }
  };

  disconnectBylineObservers(pane);
  pane.innerHTML = "";
  renderMe(pane);

  restorePane();
  
  updateScrollIndicatorIn($("#me-scroll-indicator"), pane, "has-me-indicator");

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {

      restorePane();
      drawMeConnectors(pane);
      updateScrollIndicatorIn($("#me-scroll-indicator"), pane, "has-me-indicator");
    });
  });

  scheduleMeConnectorSettle(pane, prevScroll);
}

function scheduleMeConnectorSettle(pane, prevScroll) {
  const h0 = pane.scrollHeight;
  setTimeout(() => {
    const p = $("#me-content");
    if (!p || !isWide()) return;
    if (p.scrollHeight === h0) return;   
    const sc = p.scrollTop;
    drawMeConnectors(p);
    p.scrollTop = (typeof prevScroll === "number") ? prevScroll : sc;
  }, 200);
}

function pageTitleFor(tab, top) {
  if (top.view.startsWith("talk:"))    return talkMap[top.view.slice(5)]?.id || "Talk";
  if (top.view.startsWith("session:")) return sessionMap[top.view.slice(8)]?.id || "Session";
  if (top.view.startsWith("searchresults:")) {
    
    const rest = top.view.slice("searchresults:".length);
    const ci = rest.indexOf(":");
    const query = ci < 0 ? rest : rest.slice(ci + 1);
    return query || "Search";
  }
  return ({ sessions: "Sessions", talks: "Talks", search: "Find", me: "My Schedule" })[tab];
}

function render() {

  invalidatePartial();

  if (isWide() && state.activeTab === "me") {
    state.activeTab = "sessions";
  }

  const tab = state.activeTab;
  const stack = state.tabStacks[tab];
  const top = stack[stack.length - 1];

  $("#page-title").textContent = pageTitleFor(tab, top);

  $("#back-btn").hidden = stack.length <= 1;

  $$("#tabbar .tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  document.body.dataset.activeTab = tab;

  const viewKind =
      top.view.startsWith("session:")       ? "session-detail"
    : top.view.startsWith("talk:")          ? "talk-detail"
    : top.view.startsWith("searchresults:") ? "search-results"
    : (tab === "search")                    ? "search-results"
    : (tab === "me")                        ? "schedule"
    :                                         "list";
  document.body.dataset.activeView = viewKind;

  if (tab === "me" && top.view === "list") {
    fitTitle($("#page-title"), "My Schedule", "Me");
  }

  const showPastVisible = isWide()
                          || top.view === "list"
                          || top.view.startsWith("searchresults:");
  $("#bottom-controls").hidden = !showPastVisible;
  $("#show-past").checked = !!state.showPast;
  updateDateRangeLabel();
  fitBottomControls();
  if (!showPastVisible && state.typesPanelOpen) {
    state.typesPanelOpen = false;
  }

  renderTopbarExtras(tab, top);

  const c = $("#content");
  disconnectBylineObservers(c);
  c.innerHTML = "";

  if (top.view === "list") {
    if      (tab === "sessions") renderSessionsList(c);
    else if (tab === "talks")    renderTalksList(c);
    else if (tab === "search")   renderSearch(c);
    else if (tab === "me")       renderMe(c);
  } else if (top.view.startsWith("session:")) {
    renderSessionDetail(c, top.view.slice(8));
  } else if (top.view.startsWith("talk:")) {
    renderTalkDetail(c, top.view.slice(5));
  } else if (top.view.startsWith("searchresults:")) {
    renderClickSearchResults(c, top.view.slice("searchresults:".length));
  }

  refreshTypesPanel();
  updateScrollIndicator();

  if (isWide() && (top.view.startsWith("talk:") || top.view.startsWith("session:"))) {
    const mainId = top.view.startsWith("talk:") ? top.view.slice(5) : top.view.slice(8);

    const ids = new Set(navItems().filter(isSchedulable).map(itemId));
    if (!_selCursorId || !ids.has(_selCursorId)) {
      _selIds = new Set([mainId]);
      _selCursorId = mainId; _selAnchorId = mainId; _selPillIdx = -1;
    }
  }

  applySelection();

  renderMePane();

  const target = top.scrollY || 0;
  const anchor = top.scrollAnchor || null;
  const place = () => {
    if (!(anchor && restoreListAnchor(anchor))) setLeftScrollTop(target);
  };

  place();
  requestAnimationFrame(() => {
    place();
    requestAnimationFrame(() => {
      place();
      updateScrollIndicator();

      drawMeConnectors();
      
      drawSessionDetailConnectors();
      
      drawSessionListConnectors();
    });
  });
}

function snapshotScroll() {
  const stack = state.tabStacks[state.activeTab];
  if (!stack.length) return;
  const entry = stack[stack.length - 1];

  entry.scrollY = leftScrollTop();

  entry.scrollAnchor = captureListAnchor();
}

function leftScrollTop() {
  const c = $("#content");
  return c ? c.scrollTop : 0;
}
function setLeftScrollTop(y) {
  const c = $("#content");
  if (c) c.scrollTop = y;
}

function rerenderPreservingAnchor() {
  snapshotScroll();
  render();
}

function navigate(view) {
  snapshotScroll();

  _replaceNav();
  state.tabStacks[state.activeTab].push({ view, scrollY: 0 });

function back() {
  const stack = state.tabStacks[state.activeTab];
  if (stack.length > 1) {
    stack.pop();

    render();

}

function triggerBack(keepFlag) {
  selectOriginOnBack();
  if (!keepFlag) _selActive = false;
  if (_navIdx > 0) history.back();
  else if (canGoBack()) back();
}

let _navIdx = 0;   
let _exiting = false;   
const _cloneNav = (o) => JSON.parse(JSON.stringify(o));

function _navSnapshot() {
  return { tab: state.activeTab, stacks: _cloneNav(state.tabStacks) };
}

function _applyNavSnapshot(snap) {
  if (!snap) return;                 
  state.activeTab = snap.tab;
  state.tabStacks = _cloneNav(snap.stacks);
  saveState();
  render();
}

function _pushNav() {
  _navIdx++;
  try { history.pushState({ fcaIdx: _navIdx, fcaSnap: _navSnapshot() }, ""); }
  catch (_) {}
}

function _replaceNav() {
  try { history.replaceState({ fcaIdx: _navIdx, fcaSnap: _navSnapshot() }, ""); }
  catch (_) {}
}

function canGoBack() {
  const stack = state.tabStacks[state.activeTab];
  return !!(stack && stack.length > 1);
}

window.addEventListener("popstate", (e) => {
  const st = e.state;
  if (st && st.fcaGuard) {

    if (_exiting) { _exiting = false; history.back(); return; }
    snapshotScroll();
    _navIdx = 0;
    try { history.pushState({ fcaIdx: 0, fcaSnap: _navSnapshot() }, ""); } catch (_) {}
    showExitConfirm();
    return;
  }
  _navIdx = (st && typeof st.fcaIdx === "number") ? st.fcaIdx : 0;
  _applyNavSnapshot(st && st.fcaSnap);
});

function showExitConfirm() {
  if (document.querySelector(".exit-confirm")) return;   
  const overlay = el("div", { class: "sheet-overlay exit-confirm" });
  const card    = el("div", { class: "sheet-card" });
  card.appendChild(el("h2", { class: "sheet-title" }, "Leave the app?"));
  card.appendChild(el("p", { class: "sheet-hint" },
    "You’re at the top — pressing Back again would close the app."));
  const btns  = el("div", { class: "sheet-btns" });
  const stay  = el("button", { class: "sheet-btn sheet-btn-cancel" }, "Stay");
  const leave = el("button", { class: "sheet-btn sheet-btn-primary" }, "Leave");
  btns.appendChild(stay);
  btns.appendChild(leave);
  card.appendChild(btns);
  overlay.appendChild(card);
  document.body.appendChild(overlay);

  const doStay  = () => { overlay.remove(); };   
  const doLeave = () => {
    overlay.remove();
    _exiting = true;     
    history.back();
  };
  stay.addEventListener("click", doStay);
  leave.addEventListener("click", doLeave);
  overlay.addEventListener("click", e => { if (e.target === overlay) doStay(); });
  card.addEventListener("click", e => e.stopPropagation());
}

function seedBackHistory() {
  const tab = state.activeTab;
  const depth = (state.tabStacks[tab] || []).length;
  const snapAt = (d) => {
    const stacks = _cloneNav(state.tabStacks);
    stacks[tab] = stacks[tab].slice(0, d);
    return { tab, stacks };
  };

  try { history.replaceState({ fcaGuard: true }, ""); } catch (_) {}
  _navIdx = 0;
  try { history.pushState({ fcaIdx: 0, fcaSnap: snapAt(1) }, ""); } catch (_) {}
  for (let d = 2; d <= depth; d++) {
    _navIdx++;
    try { history.pushState({ fcaIdx: _navIdx, fcaSnap: snapAt(d) }, ""); } catch (_) {}
  }
}

function leftScroller() {
  return isWide() ? $("#content") : null;
}

function captureListAnchor(scroller) {
  if (scroller === undefined) scroller = leftScroller();
  const topEdge = scroller ? scroller.getBoundingClientRect().top : 0;
  const bubbles = (scroller || document).querySelectorAll(".bubble[data-bubble-id]");
  let best = null;
  for (let i = 0; i < bubbles.length; i++) {
    const b = bubbles[i];
    const r = b.getBoundingClientRect();

    if (r.bottom > topEdge + 1) {

      const fallbacks = [];
      for (let j = i + 1; j < bubbles.length && fallbacks.length < 8; j++) {
        const id = bubbles[j].getAttribute("data-bubble-id");
        if (id) fallbacks.push(id);
      }
      best = {
        id:        b.getAttribute("data-bubble-id"),
        sessionId: b.getAttribute("data-session-id") || "",
        offset:    r.top - topEdge,   
        fallbacks,                    
      };
      break;
    }
  }
  return best;
}

function restoreListAnchor(anchor, scroller) {
  if (!anchor) return false;
  if (scroller === undefined) scroller = leftScroller();
  const root = scroller || document;
  const find = (id) =>
    id ? root.querySelector(`.bubble[data-bubble-id="${cssEsc(id)}"]`)
       : null;
  let target = find(anchor.id);
  if (!target && anchor.sessionId) target = find(anchor.sessionId);
  let usedFallback = false;
  if (!target && Array.isArray(anchor.fallbacks)) {

    for (const fid of anchor.fallbacks) {
      target = find(fid);
      if (target) { usedFallback = true; break; }
    }
  }
  if (!target) return false;
  const topEdge = scroller ? scroller.getBoundingClientRect().top : 0;
  const cur = target.getBoundingClientRect().top - topEdge;

  const wantOffset = usedFallback ? 0 : anchor.offset;
  const delta = cur - wantOffset;
  if (scroller) {
    scroller.scrollTop += delta;
  } else {
    setLeftScrollTop(leftScrollTop() + delta);
  }
  return true;
}

function cssEsc(s) {
  if (window.CSS && CSS.escape) return CSS.escape(s);
  return String(s).replace(/["\\\]]/g, "\\$&");
}

function collapseAllSessions() {
  if (!(state.expandedSessions || []).length) return;

  const anchor = captureListAnchor();

  state.expandedSessions = [];

  const stack = state.tabStacks[state.activeTab];
  stack[0].scrollY = leftScrollTop();
  stack[0].scrollAnchor = anchor || null;

  saveState();
  _replaceNav();   
  render();

  if (anchor) {
    requestAnimationFrame(() => requestAnimationFrame(() => {
      restoreListAnchor(anchor);
      updateScrollIndicator();
    }));
  }
}

function expandableSessionIds() {
  return DATA.sessions
    .map(s => s.id)
    .filter(isExpandableSession);
}

function expandAllSessions() {
  const ids = expandableSessionIds();
  if (!ids.length) return;

  const anchor = captureListAnchor();

  snapshotScroll();
  state.expandedSessions = ids;
  saveState();
  _replaceNav();   
  render();

  if (anchor) {
    requestAnimationFrame(() => requestAnimationFrame(() => {
      restoreListAnchor(anchor);
      updateScrollIndicator();
    }));
  }
}

function toggleTimeBucketSessions(ids) {
  if (!ids || !ids.length) return;
  const open = new Set(state.expandedSessions || []);
  const anyOpen = ids.some(id => open.has(id));

  const anchor = captureListAnchor();
  snapshotScroll();
  if (anyOpen) {
    for (const id of ids) open.delete(id);
  } else {
    for (const id of ids) if (isExpandableSession(id)) open.add(id);
  }
  state.expandedSessions = [...open];

  const stack = state.tabStacks[state.activeTab];
  stack[0].scrollY = leftScrollTop();
  stack[0].scrollAnchor = anchor || null;

  saveState();
  _replaceNav();

  const svg = document.querySelector("#session-list-connectors");
  if (svg) svg.remove();
  render();

  if (anchor) {
    requestAnimationFrame(() => requestAnimationFrame(() => {
      restoreListAnchor(anchor);
      updateScrollIndicator();
    }));
  }
}

function makeTimeToggle(ids) {

  ids = ids || [];
  const disabled = ids.length === 0;
  const open = new Set(state.expandedSessions || []);
  const anyOpen = ids.some(id => open.has(id));
  const label = disabled
    ? "Nothing to expand at this time"
    : (anyOpen ? "Collapse sessions at this time"
               : "Expand all sessions at this time");
  const btn = el("button", {
    class: "th-toggle" + (disabled ? " disabled" : ""),
    title: label,
    "aria-label": label,
    html: chevronsSvg(anyOpen ? "up" : "down"),
    onclick: (e) => {
      e.stopPropagation();
      if (!ids.length) return;
      toggleTimeBucketSessions(ids);
    },
  });
  if (disabled) btn.setAttribute("aria-disabled", "true");
  return btn;
}

function switchTab(tab) {

  if (tab === "me" && isWide()) return;
  const stack = state.tabStacks[tab];
  const drilledIn = !!(stack && stack.length > 1);
  if (tab === state.activeTab && !drilledIn) return;   

  const carry = _crossTabCarry(tab);
  snapshotScroll();
  _replaceNav();                 
  state.activeTab = tab;
  if (drilledIn) stack.length = 1;   

  if (carry) _setupCarried(carry);
  _pushNav();                    
  saveState();
  render();
  if (!carry) {

    keepSelectionIfVisible();
  }
}

function searchFor(query, mode) {
  query = (query || "").trim();
  if (!query) return;
  const m = (mode === "name" || mode === "affil") ? mode : "text";
  const view = "searchresults:" + m + ":" + query;
  navigate(view);
}

function focusSearch() {
  clearSelection();              
  snapshotScroll();
  const stack = state.tabStacks["search"];

  const changed = state.activeTab !== "search" || (stack && stack.length > 1);
  if (changed) _replaceNav();    
  state.activeTab = "search";
  if (stack && stack.length > 1) stack.length = 1;
  if (changed) _pushNav();
  saveState();
  render();
  const focusIt = () => {
    const input = $("#search-input");
    if (input && document.activeElement !== input) {
      input.focus();
      input.select();
    }
  };
  focusIt();
  requestAnimationFrame(focusIt);
}

document.addEventListener("pointerdown", (e) => {

document.addEventListener("keydown", (e) => {
  const isFind = (e.ctrlKey || e.metaKey) && !e.altKey
    && (e.key === "f" || e.key === "F");
  if (!isFind) return;
  if (typeof isWide === "function" && !isWide()) return;
  e.preventDefault();
  focusSearch();
});

const _TAB_KEYS = { s: "sessions", t: "talks", f: "search", m: "me" };
document.addEventListener("keydown", (e) => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  const el = e.target;
  if (el && (el.tagName === "INPUT" || el.tagName === "TEXTAREA" || el.isContentEditable))
    return;
  if (document.querySelector(".sheet-overlay")) return;   
  const tab = _TAB_KEYS[(e.key || "").toLowerCase()];
  if (!tab) return;

});

document.addEventListener("keydown", (e) => {

  if (el && (el.tagName === "INPUT" || el.tagName === "TEXTAREA" || el.isContentEditable)) {
    e.preventDefault();
    el.blur();
  }
});

document.addEventListener("keydown", (e) => {
  if (!(e.ctrlKey || e.metaKey) || e.altKey) return;
  const k = (e.key || "").toLowerCase();
  if (k !== "z" && k !== "y") return;
  const el = e.target;
  if (el && (el.tagName === "INPUT" || el.tagName === "TEXTAREA" || el.isContentEditable))
    return;
  e.preventDefault();
  if (k === "z") undoSchedule();
  else redoSchedule();
});

let _selIds      = new Set();
let _selCursorId = null;
let _selAnchorId = null;
let _selPillIdx  = -1;
let _selActive   = false;

let _spaceHold   = null;
const _KEY_LP_MS = 500;

function navItems() {
  return [...document.querySelectorAll(
    "#content .detail-head[data-detail-id], #content .bubble[data-bubble-id], "
    + "#content [data-navkey]")];
}

function itemId(elc) {
  return elc.dataset.navkey != null ? elc.dataset.navkey
       : elc.dataset.bubbleId != null ? elc.dataset.bubbleId
       : elc.dataset.detailId;
}

function isSchedulable(elc) {
  return !!elc && (elc.dataset.bubbleId != null || elc.dataset.detailId != null);
}

function navRows() {
  const rows = [];
  let curType = null, curRow = null;
  for (const elc of navItems()) {
    const key = itemId(elc) || "";
    const type = key.startsWith("author:") ? "author" : null;
    if (type !== null && type === curType) curRow.push(elc);
    else { curRow = [elc]; rows.push(curRow); curType = type; }
  }
  return rows;
}
function cursorItemEl() {
  if (_selCursorId == null) return null;
  return navItems().find(elc => itemId(elc) === _selCursorId) || null;
}

function selectedItemEl() { return cursorItemEl(); }
function searchPills() {
  return [...document.querySelectorAll("#search-suggest .suggest-bubble")];
}

function applySelection() {
  document.querySelectorAll(
    "#content .bubble.selected, #content .detail-head.selected, "
    + "#content [data-navkey].selected, .suggest-bubble.selected"
  ).forEach(b => b.classList.remove("selected"));
  if (!isWide() || !_selActive) return;
  if (_selPillIdx >= 0) {
    const pills = searchPills();
    if (_selPillIdx < pills.length) pills[_selPillIdx].classList.add("selected");
    else _selPillIdx = -1;
    return;
  }
  if (!_selIds.size) return;
  for (const elc of navItems()) {
    if (_selIds.has(itemId(elc))) elc.classList.add("selected");
  }
}

function setBubbleSelection(id, opts = {}) {
  _selIds = new Set(id == null ? [] : [id]);
  _selCursorId = id;
  _selAnchorId = id;
  _selPillIdx = -1;
  applySelection();
  if (opts.scroll && id != null) {
    const elc = cursorItemEl();
    if (elc) elc.scrollIntoView({ block: "nearest" });
  }
}
function setPillSelection(idx) {
  _selPillIdx = idx;
  _selIds = new Set();
  _selCursorId = null;
  _selAnchorId = null;
  applySelection();
  const pills = searchPills();
  if (pills[idx]) pills[idx].scrollIntoView({ block: "nearest" });
}
function clearSelection() {
  _selIds = new Set();
  _selCursorId = null;
  _selAnchorId = null;
  _selPillIdx = -1;
  _selActive = false;        
  applySelection();
}

function ctrlClickItem(id, range) {
  if (range) {                          
    const items = navItems();
    const anchor = _selAnchorId != null ? _selAnchorId : id;
    _selAnchorId = anchor;
    _selCursorId = id;
    selectRange(items, anchor, id);
  } else if (_selIds.has(id)) {         
    _selIds.delete(id);
    _selCursorId = null;
    _selAnchorId = null;
  } else {                              
    _selIds = new Set([id]);
    _selCursorId = id;
    _selAnchorId = id;
  }
  _selPillIdx = -1;
  _selActive = true;                    
  applySelection();
}

function selectRange(items, anchorId, cursorId) {
  const ids = items.map(itemId);
  let a = ids.indexOf(anchorId), b = ids.indexOf(cursorId);
  if (a < 0 || b < 0) { _selIds = new Set(cursorId == null ? [] : [cursorId]); return; }
  if (a > b) { const tmp = a; a = b; b = tmp; }
  _selIds = new Set(ids.slice(a, b + 1));
}

function toggleExpandSessions(ids) {
  const expandable = ids.filter(isExpandableSession);
  if (!expandable.length) return;
  const set = new Set(state.expandedSessions || []);
  const allOpen = expandable.every(id => set.has(id));
  for (const id of expandable) { if (allOpen) set.delete(id); else set.add(id); }
  snapshotScroll();
  state.expandedSessions = [...set];
  saveState();
  const svg = document.querySelector("#session-list-connectors");
  if (svg) svg.remove();
  render();
}

function selectOriginOnBack() {
  if (!isWide()) return;
  const v = currentTopView();
  let id = null;
  if (v.startsWith("talk:")) id = v.slice(5);
  else if (v.startsWith("session:")) id = v.slice(8);
  if (id != null) { _selIds = new Set([id]); _selCursorId = id; _selAnchorId = id; _selPillIdx = -1; }
}

function focusSearchBox() {
  clearSelection();
  const i = $("#search-input");
  if (i) { i.focus(); i.select(); }
}

function selectFirstResult() {
  const items = navItems();
  if (items.length) setBubbleSelection(itemId(items[0]), { scroll: true });
}

function _firstVisibleItemIdx(items) {
  const c = $("#content").getBoundingClientRect();
  let firstPartial = -1;
  for (let i = 0; i < items.length; i++) {
    const r = items[i].getBoundingClientRect();
    if (!(r.bottom > c.top + 1 && r.top < c.bottom - 1)) continue;   
    if (firstPartial < 0) firstPartial = i;
    if (r.top >= c.top - 1 && r.bottom <= c.bottom + 1) return i;     
  }
  return firstPartial >= 0 ? firstPartial : 0;
}
function _lastVisibleItemIdx(items) {
  const c = $("#content").getBoundingClientRect();
  let lastPartial = -1;
  for (let i = items.length - 1; i >= 0; i--) {
    const r = items[i].getBoundingClientRect();
    if (!(r.bottom > c.top + 1 && r.top < c.bottom - 1)) continue;
    if (lastPartial < 0) lastPartial = i;
    if (r.top >= c.top - 1 && r.bottom <= c.bottom + 1) return i;
  }
  return lastPartial >= 0 ? lastPartial : items.length - 1;
}

function _itemInView(el) {
  const c = $("#content");
  if (!c || !el) return false;
  const cr = c.getBoundingClientRect();
  const r = el.getBoundingClientRect();
  return r.bottom > cr.top + 1 && r.top < cr.bottom - 1;
}

function keepSelectionIfVisible() {
  if (!_selActive) return;
  const el = cursorItemEl();
  if (el && _itemInView(el)) applySelection();
  else clearSelection();
}

function _crossTabCarry(newTab) {
  if (!isWide()) return null;
  const isList = (t) => t === "sessions" || t === "talks";
  if (!isList(newTab)) return null;
  const v = currentTopView();
  const inDetail = v.startsWith("talk:") || v.startsWith("session:");
  const inSearchResults = v.startsWith("searchresults:")
    || (state.activeTab === "search" && v === "list");

  if (!isList(state.activeTab) && !inDetail && !inSearchResults) return null;

  let sel;
  if (_selActive && _selIds.size) sel = [..._selIds];
  else if (inDetail) sel = [v.startsWith("talk:") ? v.slice(5) : v.slice(8)];
  else return null;
  const topBy = (ids, map) => {
    const xs = ids.filter(id => map[id]);
    if (!xs.length) return null;
    xs.sort((a, b) => cmpTs(map[a].start_ts, map[b].start_ts));
    return xs[0];
  };
  if (newTab === "sessions") {
    const sess = topBy(sel, sessionMap);
    if (sess) return { kind: "session", id: sess };
    const talk = topBy(sel, talkMap);
    if (talk) {
      const sid = talkMap[talk].session_id;
      if (sid && isExpandableSession(sid) && !isSessionExpanded(sid)) {
        state.expandedSessions = [...(state.expandedSessions || []), sid];
        saveState();
      }
      return { kind: "talk", id: talk };
    }
    return null;
  }
  const talk = topBy(sel, talkMap);
  if (talk) return { kind: "talk", id: talk };

  const sess = topBy(sel, sessionMap);
  if (sess) {
    const first = _firstTalkOfSession(sess);
    if (first) return { kind: "talk", id: first };
  }
  return null;
}

function _firstTalkOfSession(sid) {
  const s = sessionMap[sid];
  const ids = s && Array.isArray(s.talk_ids) ? s.talk_ids : [];
  const talks = ids.map(id => talkMap[id]).filter(Boolean);
  if (!talks.length) return null;
  talks.sort((a, b) => cmpTs(a.start_ts, b.start_ts));
  return talks[0].id;
}

function _setupCarried(carry) {
  const id = carry.id;
  _selIds = new Set([id]);
  _selCursorId = id; _selAnchorId = id; _selPillIdx = -1;
  _selActive = true;   
  const c = $("#content");
  const ch = c ? c.clientHeight : 600;

  const sid = carry.kind === "talk" ? ((talkMap[id] && talkMap[id].session_id) || "") : "";
  const stack = state.tabStacks[state.activeTab];
  const top = stack[stack.length - 1];

  top.scrollAnchor = { id, sessionId: sid, offset: Math.max(0, ch / 2 - 28), fallbacks: [] };
  top.scrollY = 0;
}

document.addEventListener("keydown", (e) => {
  if (!isWide()) return;

  if ((e.ctrlKey || e.metaKey) && !e.altKey && (e.key === "a" || e.key === "A")) {
    const f = e.target;
    if (f && (f.tagName === "INPUT" || f.tagName === "TEXTAREA" || f.isContentEditable)) return;
    if (document.querySelector(".sheet-overlay")) return;
    const items = navItems();
    if (!items.length) return;
    e.preventDefault();
    _selIds = new Set(items.map(itemId));
    _selAnchorId = itemId(items[0]);
    _selCursorId = itemId(items[items.length - 1]);
    _selPillIdx = -1;
    _selActive = true;
    applySelection();
    return;
  }

  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (document.querySelector(".sheet-overlay")) return;   

  const t = e.target;
  const inSearchInput = !!(t && t.id === "search-input");
  if (!inSearchInput && t &&
      (t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.isContentEditable))
    return;

  const searchRoot = state.activeTab === "search" && currentTopView() === "list";

  if (inSearchInput) {
    if (searchRoot && e.key === "ArrowDown" && !e.shiftKey) {
      e.preventDefault();
      t.blur();
      _selActive = true;
      if (searchPills().length) setPillSelection(0);
      else selectFirstResult();
    }
    return;
  }

  if (searchRoot && _selPillIdx >= 0) {
    const pills = searchPills();
    switch (e.key) {
      case "ArrowRight": e.preventDefault(); setPillSelection(Math.min(_selPillIdx + 1, pills.length - 1)); return;
      case "ArrowLeft":  e.preventDefault(); setPillSelection(Math.max(_selPillIdx - 1, 0)); return;
      case "ArrowDown":  e.preventDefault(); selectFirstResult(); return;
      case "ArrowUp":    e.preventDefault(); focusSearchBox(); return;
      case " ": case "Spacebar": case "Enter":
        e.preventDefault();
        if (pills[_selPillIdx]) pills[_selPillIdx].click();
        return;
      case "Escape":     e.preventDefault(); clearSelection(); return;
      default: return;
    }
  }

  switch (e.key) {
    case "Escape": {
      e.preventDefault();
      if (canGoBack()) triggerBack(true);   
      else clearSelection();
      return;
    }
    case "ArrowDown":
    case "ArrowUp": {
      const items = navItems();
      if (!items.length) {
        
        if (searchRoot && e.key === "ArrowUp") { e.preventDefault(); focusSearchBox(); }
        return;
      }
      e.preventDefault();
      _selActive = true;        
      const dir = e.key === "ArrowDown" ? 1 : -1;
      const cur = cursorItemEl();
      if (!cur) {   
        const idx = dir > 0 ? _firstVisibleItemIdx(items) : _lastVisibleItemIdx(items);
        setBubbleSelection(itemId(items[idx]), { scroll: true });
        return;
      }
      let idx = items.indexOf(cur);

      if (!e.shiftKey && searchRoot && e.key === "ArrowUp" && idx === 0) {
        if (searchPills().length) setPillSelection(0);
        else focusSearchBox();
        return;
      }
      if (e.shiftKey) {                         
        idx = Math.max(0, Math.min(items.length - 1, idx + dir));
        const newId = itemId(items[idx]);
        if (_selAnchorId == null) _selAnchorId = itemId(cur);
        _selCursorId = newId;
        selectRange(items, _selAnchorId, newId);
        applySelection();
        items[idx].scrollIntoView({ block: "nearest" });
        return;
      }

      const rows = navRows();
      let ri = rows.findIndex(r => r.includes(cur));
      if (ri < 0) ri = 0;
      ri = Math.max(0, Math.min(rows.length - 1, ri + dir));
      setBubbleSelection(itemId(rows[ri][0]), { scroll: true });
      return;
    }
    case " ":
    case "Spacebar":                         
    case "Enter": {                          

      if (_selIds.size > 1) {
        e.preventDefault();
        if (e.repeat) return;
        _selActive = true;
        const sessions = navItems().filter(elc =>
          elc.classList.contains("bubble") && elc.dataset.kind === "session"
          && _selIds.has(itemId(elc))).map(itemId);
        if (sessions.length) toggleExpandSessions(sessions);
        return;
      }
      const cur = cursorItemEl();
      if (!cur) return;                      
      e.preventDefault();                    
      if (e.repeat) return;                  
      if (!cur.classList.contains("bubble")) {
        if (cur.classList.contains("detail-head")) {

          if (canGoBack()) triggerBack(true);
        } else {
          
          _selActive = true;
          cur.click();
        }
        return;
      }
      _selActive = true; applySelection();   

      const id = itemId(cur);
      const kind = cur.dataset.kind;
      const detailView = kind === "talk" ? `talk:${id}` : `session:${id}`;
      const exp = kind !== "talk" && isExpandableSession(id);
      const empty = kind !== "talk" && !exp;
      if (_spaceHold) clearTimeout(_spaceHold.timer);
      _spaceHold = { id, kind, detailView, exp, empty, fired: false, timer: 0 };
      _spaceHold.timer = setTimeout(() => {
        if (!_spaceHold) return;
        _spaceHold.fired = true;

        const act = bubblePressAction(_spaceHold.kind === "talk", _spaceHold.exp,
                                      _spaceHold.empty, false, true);
        if (act === "expand") toggleSessionExpanded(_spaceHold.id);
        else if (act === "notalks") flashNoTalksNotice(_spaceHold.id);
        else navigate(_spaceHold.detailView);
      }, _KEY_LP_MS);
      return;
    }
    case "ArrowRight":
    case "ArrowLeft": {
      const cur = cursorItemEl();

      if (cur && !isSchedulable(cur)) {
        e.preventDefault();
        _selActive = true;
        const row = navRows().find(r => r.includes(cur)) || [cur];
        let i = row.indexOf(cur) + (e.key === "ArrowRight" ? 1 : -1);
        i = Math.max(0, Math.min(row.length - 1, i));
        setBubbleSelection(itemId(row[i]), { scroll: true });
        return;
      }

      const ids = (_selIds.size ? [..._selIds] : (cur ? [_selCursorId] : []))
        .filter(id => !String(id).startsWith("author:") && !String(id).startsWith("pill:"));
      if (!ids.length) return;
      e.preventDefault();
      _selActive = true;        
      const add = e.key === "ArrowRight";
      
      beginUndoBatch();
      for (const id of ids) {
        const already = state.schedule.includes(id);
        if (add && !already) toggleScheduled(id);
        else if (!add && already) toggleScheduled(id);
      }
      endUndoBatch();

      applySelection();
      return;
    }
  }
});

document.addEventListener("keyup", (e) => {
  if (e.key !== " " && e.key !== "Spacebar" && e.key !== "Enter") return;
  if (!_spaceHold) return;
  e.preventDefault();
  const hold = _spaceHold;
  clearTimeout(hold.timer);
  _spaceHold = null;
  if (hold.fired) return;                  
  
  const act = bubblePressAction(hold.kind === "talk", hold.exp, hold.empty, false, false);
  if (act === "expand") toggleSessionExpanded(hold.id);
  else if (act === "notalks") flashNoTalksNotice(hold.id);
  else navigate(hold.detailView);
});

$("#back-btn").addEventListener("click", () => {
  
  triggerBack(false);
});

$$("#tabbar .tab-btn").forEach(b => b.addEventListener("click", () => {
  const t = b.dataset.tab;
  if (t === "search" && isWide()) focusSearch();
  else switchTab(t);
}));
$("#show-past").addEventListener("change", e => {
  state.showPast = e.target.checked;
  saveState();

  rerenderPreservingAnchor();
});
$("#date-range-toggle").addEventListener("click", showDateRangeSheet);

let _scrollSaveTimer = null;
function onLeftScroll() {
  updateScrollIndicator();
  clearTimeout(_scrollSaveTimer);
  _scrollSaveTimer = setTimeout(() => {
    snapshotScroll();

    _replaceNav();
    saveState();
  }, 350);
}
window.addEventListener("scroll", onLeftScroll, { passive: true });
$("#content").addEventListener("scroll", onLeftScroll, { passive: true });

$("#types-toggle").addEventListener("click", () => toggleTypesPanel());

document.addEventListener("click", (e) => {
  if (!state.typesPanelOpen) return;
  if (e.target.closest("#types-panel") || e.target.closest("#types-toggle")) return;
  toggleTypesPanel(false);
}, true);

let _appHRaf = null;
function syncAppHeight() {
  if (_appHRaf) return;
  _appHRaf = requestAnimationFrame(() => {
    _appHRaf = null;
    const vv = window.visualViewport;

    if (vv && Math.abs(vv.scale - 1) > 0.01) return;

    const layoutH = document.documentElement.clientHeight || 0;
    const visualH = vv ? vv.height : window.innerHeight;
    let h = layoutH > 0 ? Math.min(visualH, layoutH) : visualH;

    h = Math.ceil(h);
    if (h > 0) document.documentElement.style.setProperty("--app-h", h + "px");
  });
}
syncAppHeight();
if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", syncAppHeight);
  window.visualViewport.addEventListener("scroll", syncAppHeight);
}
window.addEventListener("resize", syncAppHeight);
window.addEventListener("orientationchange", syncAppHeight);

window.addEventListener("pageshow", syncAppHeight);

let _dbgEl = null;
let _dbgTick = null;
function updateDebugOverlay() {
  if (!_dbgEl) return;
  const vv = window.visualViewport;
  const body = document.body.getBoundingClientRect();
  const tab = document.getElementById("tabbar");
  const tabRect = tab ? tab.getBoundingClientRect() : null;
  const appH = getComputedStyle(document.documentElement)
                 .getPropertyValue("--app-h").trim() || "(unset)";
  const layoutH = document.documentElement.clientHeight;

  const overflow = tabRect ? Math.round(tabRect.bottom - layoutH) : "n/a";

  const cs = getComputedStyle(document.documentElement);
  const safeB = cs.getPropertyValue("--safe-bottom").trim() || "?";
  const safeT = cs.getPropertyValue("--safe-top").trim() || "?";
  const tabH = cs.getPropertyValue("--tab-h").trim() || "?";

  const band = (id) => {
    const e = document.getElementById(id);
    if (!e) return `${id}: (none)`;
    const r = e.getBoundingClientRect();
    const disp = getComputedStyle(e).display;
    if (disp === "none" || r.height === 0) return `${id}: hidden`;
    return `${id}: ${Math.round(r.top)}→${Math.round(r.bottom)} (h${Math.round(r.height)})`;
  };
  _dbgEl.textContent =
    `visualViewport.h: ${vv ? Math.round(vv.height) : "n/a"}\n` +
    `documentElement.clientHeight: ${layoutH}\n` +
    `body: ${Math.round(body.top)}→${Math.round(body.bottom)} (h${Math.round(body.height)})\n` +
    `--app-h: ${appH}\n` +
    `${band("topbar")}\n` +
    `${band("scroll-indicator")}\n` +
    `${band("content")}\n` +
    `${band("bottom-controls")}\n` +
    `${band("tabbar")}\n` +
    `--tab-h: ${tabH} | safe-top: ${safeT} | safe-bot: ${safeB}\n` +
    `OVERFLOW below fold: ${overflow}\n` +
    `wide: ${isWide()}`;
}
function toggleDebugOverlay() {
  if (_dbgEl) {
    _dbgEl.remove();
    _dbgEl = null;
    if (_dbgTick) { clearInterval(_dbgTick); _dbgTick = null; }
    if (window.visualViewport) {
      window.visualViewport.removeEventListener("resize", updateDebugOverlay);
      window.visualViewport.removeEventListener("scroll", updateDebugOverlay);
    }
    window.removeEventListener("resize", updateDebugOverlay);
    return false;
  }
  _dbgEl = document.createElement("pre");

  _dbgEl.style.cssText =
    "position:fixed;top:0;left:0;z-index:99999;margin:0;padding:6px 8px;" +
    "font:11px/1.35 ui-monospace,Menlo,Consolas,monospace;white-space:pre;" +
    "background:rgba(0,0,0,.82);color:#0f0;pointer-events:none;" +
    "border-bottom-right-radius:8px;max-width:80vw;";
  document.body.appendChild(_dbgEl);
  if (window.visualViewport) {
    window.visualViewport.addEventListener("resize", updateDebugOverlay);
    window.visualViewport.addEventListener("scroll", updateDebugOverlay);
  }
  window.addEventListener("resize", updateDebugOverlay);

  _dbgTick = setInterval(updateDebugOverlay, 250);
  updateDebugOverlay();
  return true;
}

let _wasWide = isWide();
let _resizeTimer = null;
window.addEventListener("resize", () => {
  const nowWide = isWide();
  if (nowWide !== _wasWide) {
    _wasWide = nowWide;
    applyMeWidth();                
    render();                      
  } else {

    fitBottomControls();
    if (state.activeTab === "me" && currentTopView() === "list") {
      fitTitle($("#page-title"), "My Schedule", "Me");
    }
    fitTitle($(".me-pane-title"), "My Schedule", "Me");
    updateScrollIndicator();
  }

}, { passive: true });

applyMeWidth();
applyFontScale();   
initMeResize();
initMePaneScroll();
render();
seedBackHistory();  

const TIME_BOUNDARIES_MS = (() => {
  const set = new Set();
  for (const x of [...DATA.sessions, ...DATA.talks]) {
    for (const v of [x.start_ts, x.end_ts]) {
      if (!v) continue;
      const t = new Date(v).getTime();
      if (!isNaN(t)) set.add(t);
    }
  }
  return [...set].sort((a, b) => a - b);
})();

const MAX_TIMEOUT_MS = 12 * 60 * 60 * 1000;   

let _tickTimer = null;

function refreshTimeState() {

  const ae = document.activeElement;
  if (ae && (ae.tagName === "INPUT" || ae.tagName === "TEXTAREA" ||
             ae.isContentEditable)) return;

  const tab = state.activeTab;
  const stack = state.tabStacks[tab];
  const top = stack[stack.length - 1];
  if (top && top.view === "list") render();
}

function scheduleNextTick() {
  clearTimeout(_tickTimer);
  _tickTimer = null;

  const now = Date.now();
  const next = TIME_BOUNDARIES_MS.find(t => t > now);
  if (next == null) return;   

  const delay = Math.min(next - now, MAX_TIMEOUT_MS);
  _tickTimer = setTimeout(() => {

    if (Date.now() >= next) refreshTimeState();
    scheduleNextTick();        
  }, delay);
}

function rearmOnWake() {
  if (document.visibilityState === "hidden") return;
  refreshTimeState();
  scheduleNextTick();
}
document.addEventListener("visibilitychange", rearmOnWake);
window.addEventListener("pageshow", rearmOnWake);
window.addEventListener("focus", rearmOnWake);

scheduleNextTick();
</script>
